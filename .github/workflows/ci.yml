name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt check
        run: test -z "$(gofmt -l .)"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o "timemon-linux-${{ matrix.goarch }}" ./cmd/timemon

      - uses: actions/upload-artifact@v6
        with:
          name: timemon-linux-${{ matrix.goarch }}
          path: timemon-linux-${{ matrix.goarch }}
          retention-days: 30

  # NOTE: ファームウェア(firmware/)のCIビルドは意図的に無し。実機センサーが
  # まだ手元に無く検証できないため、ハードウェア検証が可能になるまでCI対象外。

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Flatten release assets
        run: |
          mkdir -p release
          find artifacts -type f -name 'timemon-linux-*' -exec cp {} release/ \;
          ls -l release

      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
