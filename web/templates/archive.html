<!DOCTYPE html>
<html lang="ja">
<head>
{{template "head-common" .}}
<title>アーカイブ | {{.EventName}}</title>
<style>
  @media(min-width:900px){
    /* .phone width/grid-layout: page-specific, see monitor.html for why
       (archive has no avatar-upsize rule here - it never had one). */
    .phone{width:min(1180px,97vw)}
    .phone{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto 1fr;
           grid-template-areas:"header header" "nav main"}
  }
  /* ---- archive-specific ---- */
  .elist{list-style:none}
  .elist li{display:flex;align-items:center;gap:10px;padding:13px 12px;border-bottom:1px solid var(--line);
            font-size:13px;cursor:pointer}
  .elist li:last-child{border:none}
  .elist li:active{background:var(--panel2)}
  .elist .nm{min-width:0;flex:1}
  .elist .nm b{display:block;font-weight:600}
  .elist .nm span{font-size:10.5px;color:var(--mut)}
  .elist .arrow{color:var(--dim);font-size:14px}
  .empty{border:1px dashed var(--line);border-radius:14px;padding:22px;text-align:center;color:var(--dim);font-size:12px}
  .backbtn{display:inline-flex;align-items:center;gap:5px;margin-bottom:12px}
  .ev-title{font-size:16px;font-weight:700;margin-bottom:2px}
  .ev-period{font-size:11px;color:var(--mut);margin-bottom:14px}
  .rk{width:100%;border-collapse:collapse;font-size:12.5px}
  .rk th{font-size:9.5px;color:var(--dim);font-weight:600;letter-spacing:.1em;text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
  .rk th.r,.rk td.r{text-align:right}
  .rk td{padding:8px;border-bottom:1px solid var(--line);vertical-align:middle}
  .rk .pos{font-family:var(--mono);font-weight:700;font-size:14px;width:22px}
  .rk tr:nth-child(1) .pos{color:var(--amber)}
  .rk td.av{width:64px;padding-right:0}
  .rk .nm b{display:block;font-weight:600}
  .rk .nm span{font-size:10px;color:var(--mut)}
  .rk .best{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;font-size:14px}
  .rk .sub{font-family:var(--mono);font-size:10px;color:var(--mut)}
  .rk tr.dead td{opacity:.45}
  .rk tr.dead .best{text-decoration:line-through}
  .lg{width:100%;border-collapse:collapse;font-size:11.5px}
  .lg th{font-size:9px;color:var(--dim);text-align:left;padding:5px 6px;border-bottom:1px solid var(--line);letter-spacing:.08em}
  .lg td{padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:middle}
  .lg .tm{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600}
  @media(min-width:900px){
    .rk{font-size:14px}
    .rk .best{font-size:16px}
  }
</style>
</head>
<body>
<div class="phone">
  <header>
    <span class="ev">アーカイブ</span>
  </header>

  <main id="main">
  <section class="screen on" id="sc-list">
    <div class="sec">終了済みイベント</div>
    <div class="card"><ul class="elist" id="ev-list"></ul></div>
  </section>

  <section class="screen" id="sc-detail">
    <button type="button" class="btn backbtn" id="back-btn">← 一覧へ戻る</button>
    <div class="ev-title" id="dt-title"></div>
    <div class="ev-period" id="dt-period"></div>
    <div class="grid2">
      <div>
        <div class="sec">RANKING</div>
        <div class="card" style="overflow:hidden">
          <table class="rk">
            <thead><tr><th></th><th></th><th>DRIVER / CAR</th><th class="r">BEST</th></tr></thead>
            <tbody id="rk-body"></tbody>
          </table>
        </div>
      </div>
      <div>
        <div class="sec">走行記録</div>
        <div class="card" style="padding:4px 8px">
          <table class="lg">
            <thead><tr><th>走者</th><th>TIME</th></tr></thead>
            <tbody id="rec-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
  </main>

  {{template "nav" .}}
</div>
<script>
'use strict';

function fmtDate(ms){
  const d = new Date(ms);
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('on', s.id === id));
}

async function loadEventList(){
  const list = document.getElementById('ev-list');
  clear(list);
  let events = [];
  try {
    const r = await apiGet('/api/archive/events');
    events = r.events || [];
  } catch (e) {
    list.appendChild(h('li', {}, 'イベント一覧の取得に失敗しました'));
    return;
  }
  if (!events.length){
    list.appendChild(h('li', {}, h('div', { class: 'empty', style: 'width:100%' }, '終了したイベントはまだありません')));
    return;
  }
  events.forEach(ev => {
    const dateStr = fmtDate(ev.created_at_ms);
    const li = h('li', {},
      h('div', { class: 'nm' }, h('b', {}, ev.name), h('span', {}, dateStr)),
      h('span', { class: 'arrow' }, '›')
    );
    li.addEventListener('click', () => openEvent(ev));
    list.appendChild(li);
  });
}

async function openEvent(ev){
  document.getElementById('dt-title').textContent = ev.name;
  document.getElementById('dt-period').textContent = fmtDate(ev.created_at_ms);
  showScreen('sc-detail');

  const rkBody = document.getElementById('rk-body');
  const recBody = document.getElementById('rec-body');
  clear(rkBody);
  clear(recBody);
  rkBody.appendChild(h('tr', {}, h('td', { colspan: '4', style: 'text-align:center;color:var(--dim);padding:14px' }, '読み込み中…')));

  try {
    const [rank, recent] = await Promise.all([
      apiGet(`/api/archive/${ev.id}/ranking`),
      apiGet(`/api/archive/${ev.id}/recent`)
    ]);
    drawRanking(rank.rows || []);
    drawRecent(recent.items || []);
  } catch (e) {
    clear(rkBody);
    rkBody.appendChild(h('tr', {}, h('td', { colspan: '4', style: 'text-align:center;color:var(--red)' }, '読み込みに失敗しました')));
  }
}

function drawRanking(rows){
  const tb = document.getElementById('rk-body');
  clear(tb);
  if (!rows.length){
    tb.appendChild(h('tr', {}, h('td', { colspan: '4', style: 'text-align:center;color:var(--dim);padding:20px' }, '記録なし')));
    return;
  }
  let pos = 0;
  rows.forEach(r => {
    const isDead = !!r.invalid;
    const p = isDead ? '—' : String(++pos);
    const dAv = h('div', { class: 'avatar sm' });
    avatarInto(dAv, r.driver.id, r.driver.name, !!r.driver.has_icon);
    const vAv = h('div', { class: 'avatar sm' });
    vehicleAvatarInto(vAv, r.vehicle.id, r.vehicle.name, !!r.vehicle.has_icon);
    tb.appendChild(h('tr', { class: isDead ? 'dead' : '' },
      h('td', { class: 'pos t' }, p),
      h('td', { class: 'av' }, h('div', { class: 'avpair' }, dAv, vAv)),
      h('td', { class: 'nm' },
        h('b', {}, r.driver.name + ' ', h('span', { style: 'font-weight:400;color:var(--dim)' }, r.driver_class || '')),
        h('span', {}, `#${r.vehicle.number} ${r.vehicle.name} ・ ${r.vehicle.disp_class} / ${r.vehicle.dt_class}`)
      ),
      h('td', { class: 'r' },
        h('span', { class: 'best' }, r.best_ms !== null && r.best_ms !== undefined ? fmt3(r.best_ms) : '—'),
        h('br'),
        h('span', { class: 'sub' }, `2nd ${r.second_ms !== null && r.second_ms !== undefined ? fmt3(r.second_ms) : '—'} ・ ${r.runs}本`)
      )
    ));
  });
}

function drawRecent(items){
  const tb = document.getElementById('rec-body');
  clear(tb);
  if (!items.length){
    tb.appendChild(h('tr', {}, h('td', { colspan: '2', style: 'text-align:center;color:var(--dim);padding:14px' }, '走行記録なし')));
    return;
  }
  items.forEach(it => {
    const tr = h('tr', {});
    tr.appendChild(h('td', {},
      h('b', {}, it.driver.name), h('br'),
      h('span', { style: 'font-size:9.5px;color:var(--mut)' }, `#${it.vehicle.number} ${it.vehicle.name}`)
    ));
    const tmCell = h('td', { class: 'tm', style: it.invalid ? 'color:var(--dim);text-decoration:line-through' : '' }, fmt3(it.final_ms));
    tr.appendChild(tmCell);
    tb.appendChild(tr);
  });
}

document.getElementById('back-btn').addEventListener('click', () => showScreen('sc-list'));

loadEventList();
</script>
</body>
</html>
