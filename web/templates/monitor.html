<!DOCTYPE html>
<html lang="ja">
<head>
{{template "head-common" .}}
<title>{{.EventName}} | モニター</title>
<style>
  /* header .live "LIVE" indicator: only monitor/ranking/register show it
     (archive is historical, setup shows a "SETUP" badge instead), so it
     stays a page-specific rule rather than living in app.css. */
  header .live{margin-left:auto;font-size:10px;color:var(--go);font-family:var(--mono);display:flex;align-items:center;gap:5px}
  header .live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--go);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media(min-width:900px){
    /* .phone width/grid-layout and avatar upsizing are shared only by the
       nav-bearing two-pane pages (monitor/ranking/archive) - not common to
       all 5 templates, so kept here rather than in app.css. */
    .phone{width:min(1180px,97vw)}
    .phone{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto 1fr;
           grid-template-areas:"header header" "nav main"}
    .avatar{width:46px;height:46px;font-size:18px}
    .avatar.sm{width:30px;height:30px;font-size:12px}
    .avstack{width:54px;height:54px}
    .avstack>.avatar:first-child{width:54px;height:54px;font-size:20px}
  }
  /* ---- monitor-specific ---- */
  .evbanner{background:#2c2718;border-bottom:1px solid #77771f;color:var(--amber);font-size:11.5px;
            padding:9px 12px;text-align:center}
  .evbanner a{color:var(--amber)}
  .oncourse{border-radius:14px;padding:13px 14px;margin-bottom:9px;position:relative;overflow:hidden;cursor:pointer;
            background:linear-gradient(135deg,#1f2937,#1a222d);border:1px solid #3a4656}
  .oncourse.mc{border-color:#4a4a52;background:linear-gradient(135deg,#26262b,#1e1e23)}
  .oncourse .who{display:flex;align-items:center;gap:10px}
  .oncourse .nm{font-size:15px;font-weight:700}
  .oncourse .vh{font-size:11px;color:var(--mut);margin-top:1px}
  .oncourse .clk{margin-left:auto;text-align:right}
  .oncourse .clk .tm{font-size:30px;font-weight:600;font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em;color:var(--go)}
  .oncourse.armed .clk .tm{color:var(--dim);font-size:22px}
  .oncourse.mc .clk .tm{color:var(--dim)}
  .oncourse .clk .tm.offsetwait{font-size:13px;color:var(--dim)}
  .oncourse .clk .lb{font-size:9px;color:var(--dim);letter-spacing:.15em;margin-top:1px}
  .mcband{position:absolute;top:11px;right:-34px;background:#4d4d55;color:#c9c9d2;font-size:9px;letter-spacing:.12em;
          padding:3px 36px;transform:rotate(38deg)}
  .oncourse.flash{border-color:var(--amber)}
  .oncourse.flash .clk .tm{color:var(--amber)}
  .empty-course{border:1px dashed var(--line);border-radius:14px;padding:18px;text-align:center;color:var(--dim);font-size:12px}
  .res{list-style:none}
  .res li{display:flex;align-items:center;gap:9px;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px}
  .res li:last-child{border:none}
  .res .hn{font-family:var(--mono);font-size:10.5px;color:var(--dim);width:26px;flex:none}
  .res .nm{min-width:0}
  .res .nm b{font-size:13px;font-weight:600;display:block}
  .res .nm span{font-size:10.5px;color:var(--mut)}
  .res .tm{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:15px;font-weight:600}
  .res .pt{font-size:9.5px;color:var(--amber);font-family:var(--mono)}
  .res .rgt{margin-left:auto;text-align:right;flex:none}
  .res .meta{display:flex;justify-content:flex-end;align-items:center;gap:5px;margin-top:2px}
  .res .src{font-size:9.5px;color:var(--dim);font-family:var(--mono)}
  .res li.new{background:linear-gradient(90deg,rgba(58,208,127,.10),transparent);animation:fadein .5s}
  .res li.dead .tm{color:var(--dim);text-decoration:line-through}
  .res li.dead .badge{color:var(--red);border-color:#5a3038}
  @keyframes fadein{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
  .q{list-style:none}
  .q li{display:flex;align-items:center;gap:9px;padding:10px 10px;border-bottom:1px solid var(--line);font-size:12.5px}
  .q li:last-child{border:none}
  .q .pos{font-family:var(--mono);color:var(--dim);font-size:11px;width:18px;flex:none}
  .q .nm b{font-weight:600;display:block}
  .q .nm span{font-size:10px;color:var(--mut)}
  #fsview{position:absolute;inset:0;background:#0a0c0f;z-index:60;display:none}
  #fsview.on{display:block}
  .fs-rot{position:absolute;top:50%;left:50%;display:flex;flex-direction:column;
          align-items:center;justify-content:center;gap:2%}
  .fs-head{display:flex;align-items:baseline;gap:14px}
  .fs-name{font-size:26px;font-weight:800}
  .fs-veh{font-size:14px;color:var(--mut)}
  .fs-time{font-weight:700;color:var(--go);font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1;
           font-size:120px;white-space:nowrap}
  .fs-time.fin{color:var(--amber)}
  .fs-time.mc{color:var(--dim)}
  .fs-time.offsetwait{font-size:28px!important;color:var(--dim)}
  .fs-status{font-size:12px;color:var(--dim);letter-spacing:.4em}
  .fs-btn{position:absolute;background:var(--panel);border:1px solid var(--line);color:var(--mut);
          border-radius:99px;padding:9px 16px;font-size:12px;cursor:pointer;font-family:inherit}
  .fs-close{top:14px;right:14px}
  .fs-flip{bottom:14px;right:14px}
  @media(min-width:900px){
    .oncourse{padding:18px 20px}
    .oncourse .clk .tm{font-size:46px}
    .oncourse .nm{font-size:19px}
    .res li{font-size:14.5px;padding:12px 14px}
    .res .tm{font-size:18px}
  }
</style>
</head>
<body>
<div class="phone">
  <header>
    <span class="ev">{{.EventName}}</span>
    <span class="live t">LIVE</span>
  </header>

  <main id="main">
  <div class="evbanner" id="no-event-banner" style="display:none">開催中のイベントはありません — <a href="/archive">過去の記録はアーカイブへ</a></div>
  <section class="screen on" id="sc-monitor">
    <div class="grid2">
      <div>
        <div class="sec">ON COURSE — 走行中</div>
        <div id="mon-course"></div>
        <div class="sec">NEXT — 出走待ち</div>
        <div class="card"><ul class="q" id="mon-next"></ul></div>
      </div>
      <div>
        <div class="sec">RECENT — 直近リザルト</div>
        <div class="card"><ul class="res" id="mon-recent"></ul></div>
      </div>
    </div>
  </section>
  </main>

  {{template "nav" .}}

  <div id="fsview">
    <div class="fs-rot" id="fs-rot">
      <div class="fs-head"><span class="fs-name" id="fs-name"></span><span class="fs-veh" id="fs-veh"></span></div>
      <div class="fs-time t" id="fs-time">0:00.0</div>
      <div class="fs-status" id="fs-status">RUNNING</div>
      <button class="fs-btn fs-close" id="fs-close">✕ 閉じる</button>
      <button class="fs-btn fs-flip" id="fs-flip">⇅ 上下入れ替え</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>
<script>
'use strict';

/* ---------- toast (page-specific: setup.html uses a different timeout, so
   this isn't shared via app.js - see task report) ---------- */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toast._tm);
  toast._tm = setTimeout(() => t.classList.remove('on'), 1800);
}

/* ---------- state ---------- */
let onCourseCars = [];
let waitingQueue = [];
let settings = null;

/* ---------- no-active-event banner ---------- */
function updateEventBanner(){
  const noEvent = !settings || settings.event === null || settings.event_status === 'closed';
  document.getElementById('no-event-banner').style.display = noEvent ? 'block' : 'none';
}
async function loadSettings(){
  try { settings = await apiGet('/api/settings'); } catch (e) { /* keep last-known state */ }
  updateEventBanner();
}

/* ---------- ON COURSE + NEXT ---------- */
function renderCourse(){
  const monC = document.getElementById('mon-course');
  clear(monC);
  if (!onCourseCars.length){
    monC.appendChild(h('div', { class: 'empty-course' }, '走行待機中…'));
    return;
  }
  onCourseCars.forEach(c => {
    const armed = !c.t_start_us;
    const flash = !!c.finish;
    const waitingOffset = !armed && !flash && !offsetKnown;
    const cls = 'oncourse' + (c.mc_flag ? ' mc' : '') + (flash ? ' flash' : '') + (armed ? ' armed' : '');
    const vhChildren = [`#${c.vehicle.number} ${c.vehicle.name}`];
    if (c.pt_count) vhChildren.push(h('span', { style: 'color:var(--amber)' }, ` ・PT${c.pt_count}`));
    const av = h('div', { class: 'avatar' });
    avatarInto(av, c.driver.id, c.driver.name, !!c.driver.has_icon);
    const vAv = h('div', { class: 'avatar' });
    vehicleAvatarInto(vAv, c.vehicle.id, c.vehicle.name, !!c.vehicle.has_icon);
    const tmText = armed ? '—:——' : (flash ? fmt3(c.finish.fin_ms) : (waitingOffset ? 'タイム取得中…' : fmt1(nowMs() - c.t_start_us / 1000)));
    const el = h('div', { class: cls, onclick: () => openFS(c.queue_id) },
      c.mc_flag ? h('div', { class: 'mcband' }, 'ミスコース') : null,
      h('div', { class: 'who' },
        h('div', { class: 'avstack' }, av, vAv),
        h('div', {},
          h('div', { class: 'nm' }, c.driver.name),
          h('div', { class: 'vh' }, vhChildren)
        ),
        h('div', { class: 'clk' },
          h('div', { class: 'tm' + (waitingOffset ? ' offsetwait' : '') }, tmText),
          h('div', { class: 'lb' }, armed ? 'READY' : (flash ? 'FINISH' : 'RUNNING'))
        )
      )
    );
    monC.appendChild(el);
  });
}

function renderNext(){
  const nextEl = document.getElementById('mon-next');
  clear(nextEl);
  if (!waitingQueue.length){
    nextEl.appendChild(h('li', { style: 'color:var(--dim);font-size:11px' }, '待機なし'));
    return;
  }
  waitingQueue.slice(0, 3).forEach((q, i) => {
    const av = h('div', { class: 'avatar' });
    avatarInto(av, q.driver.id, q.driver.name, !!q.driver.has_icon);
    const vAv = h('div', { class: 'avatar' });
    vehicleAvatarInto(vAv, q.vehicle.id, q.vehicle.name, !!q.vehicle.has_icon);
    nextEl.appendChild(h('li', {},
      h('span', { class: 'pos t' }, String(i + 1)),
      h('div', { class: 'avstack' }, av, vAv),
      h('div', { class: 'nm' }, h('b', {}, q.driver.name), h('span', {}, `#${q.vehicle.number} ${q.vehicle.name}`))
    ));
  });
}

/* ---------- RECENT results (from /api/recent, refetched on ranking SSE) ---------- */
let knownRecentIds = new Set();
let recentFirstRender = true;
function renderRecent(items){
  const recent = document.getElementById('mon-recent');
  clear(recent);
  const currentIds = new Set(items.map(it => it.log_id));
  if (!items.length){
    recent.appendChild(h('li', { style: 'color:var(--dim);font-size:12px;justify-content:center' }, 'まだリザルトがありません'));
  }
  items.slice(0, 10).forEach(it => {
    const isNew = !recentFirstRender && !knownRecentIds.has(it.log_id);
    const liCls = (isNew ? 'new' : '') + (it.invalid ? ' dead' : '');
    const nmSpanText = `#${it.vehicle.number} ${it.vehicle.name}`;
    const av = h('div', { class: 'avatar' });
    avatarInto(av, it.driver.id, it.driver.name, !!it.driver.has_icon);
    const vAv = h('div', { class: 'avatar' });
    vehicleAvatarInto(vAv, it.vehicle.id, it.vehicle.name, !!it.vehicle.has_icon);
    const li = h('li', { class: liCls.trim() },
      h('span', { class: 'hn' }, it.heat !== null && it.heat !== undefined ? ('H' + it.heat) : ''),
      h('div', { class: 'avstack' }, av, vAv),
      h('div', { class: 'nm' }, h('b', {}, it.driver.name), h('span', {}, nmSpanText)),
      h('div', { class: 'rgt' },
        h('span', { class: 'tm' }, it.invalid ? '—' : fmt3(it.final_ms)),
        h('div', { class: 'meta' },
          it.is_mc ? h('span', { class: 'badge' }, 'MC') : null,
          it.pt_count ? h('span', { class: 'pt' }, 'PT' + it.pt_count) : null,
          h('span', { class: 'src' }, it.source === 'manual' ? '✍️手計測' : 'センサー')
        )
      )
    );
    recent.appendChild(li);
    if (isNew){
      const liRef = li;
      setTimeout(() => liRef.classList.remove('new'), 2500);
    }
  });
  knownRecentIds = currentIds;
  recentFirstRender = false;
}
async function refreshRecent(){
  try {
    const data = await apiGet('/api/recent?limit=10');
    renderRecent(data.items || []);
  } catch (e) { /* transient network hiccup, next SSE tick will retry */ }
}

/* ---------- fullscreen pit-board ---------- */
let fsQueueId = null, fsFlip = false, fsCloseTimer = null, lastFsCar = null;
const fsview = document.getElementById('fsview');
function fsLayout(){
  const rot = document.getElementById('fs-rot');
  const W = fsview.clientWidth, H = fsview.clientHeight;
  const portrait = H > W;
  const w = portrait ? H : W, hh = portrait ? W : H;
  rot.style.width = w + 'px'; rot.style.height = hh + 'px';
  const base = portrait ? (fsFlip ? -90 : 90) : 0;
  rot.style.transform = `translate(-50%,-50%) rotate(${base}deg)`;
  document.getElementById('fs-flip').style.display = portrait ? 'block' : 'none';
  fitFSTime(true);
}
let fsFitKey = '';
function fitFSTime(force){
  const t = document.getElementById('fs-time');
  const rot = document.getElementById('fs-rot');
  const w = rot.clientWidth, hh = rot.clientHeight;
  if (!w) return;
  const key = w + '|' + hh;
  if (!force && key === fsFitKey) return;
  fsFitKey = key;
  const save = t.textContent;
  t.textContent = '8:88.888';
  t.style.fontSize = '100px';
  const tw = t.offsetWidth || 1;
  t.style.fontSize = Math.min(100 * (w * 0.96) / tw, hh * 0.62) + 'px';
  t.textContent = save;
}
function openFS(queueId){
  fsQueueId = queueId; fsFlip = false; lastFsCar = null;
  clearTimeout(fsCloseTimer); fsCloseTimer = null;
  fsview.classList.add('on');
  fsLayout();
  renderFS();
}
function closeFS(){
  fsview.classList.remove('on'); fsQueueId = null; lastFsCar = null;
  clearTimeout(fsCloseTimer); fsCloseTimer = null;
}
document.getElementById('fs-close').addEventListener('click', closeFS);
document.getElementById('fs-flip').addEventListener('click', () => { fsFlip = !fsFlip; fsLayout(); });
window.addEventListener('resize', () => { if (fsQueueId !== null) fsLayout(); });

function renderFS(){
  if (fsQueueId === null) return;
  const t = document.getElementById('fs-time'), st = document.getElementById('fs-status');
  const car = onCourseCars.find(c => c.queue_id === fsQueueId);
  if (car) lastFsCar = car;
  const show = car || lastFsCar;
  if (!show) { closeFS(); return; }
  document.getElementById('fs-name').textContent = show.driver.name;
  document.getElementById('fs-veh').textContent = `#${show.vehicle.number} ${show.vehicle.name}` + (show.pt_count ? ` ・PT${show.pt_count}` : '');
  t.classList.toggle('mc', !!show.mc_flag);
  if (!car){
    if (!fsCloseTimer) fsCloseTimer = setTimeout(closeFS, 3000);
  } else if (!car.t_start_us){
    t.textContent = '—:——'; t.classList.remove('fin'); t.classList.remove('offsetwait'); st.textContent = 'READY';
  } else if (car.finish){
    t.textContent = fmt3(car.finish.fin_ms); t.classList.add('fin'); t.classList.remove('offsetwait'); st.textContent = 'FINISH';
  } else if (!offsetKnown){
    t.textContent = 'タイム取得中…'; t.classList.remove('fin'); t.classList.add('offsetwait'); st.textContent = 'RUNNING';
  } else {
    t.textContent = fmt1(nowMs() - car.t_start_us / 1000); t.classList.remove('fin'); t.classList.remove('offsetwait'); st.textContent = 'RUNNING';
  }
  fitFSTime();
}

/* ---------- rAF-throttled redraw (~10Hz) for running clocks ---------- */
let lastTick = 0;
function tick(ts){
  if (ts - lastTick >= 100){
    lastTick = ts;
    renderCourse();
    renderFS();
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ---------- SSE ---------- */
openStream(['ranking', 'on_course', 'queue', 'time', 'directory', 'settings'], {
  settings: d => {
    settings = d;
    updateEventBanner();
  },
  on_course: d => {
    onCourseCars = d.cars || [];
    renderCourse();
    renderFS();
  },
  queue: d => {
    waitingQueue = d.items || [];
    renderNext();
  },
  ranking: () => { refreshRecent(); },
  directory: () => {
    // directory change = user/vehicle master data (incl. icons) updated;
    // bump the cache-buster so re-renders pick up new icon bytes.
    iconRev = Date.now();
    renderCourse();
    renderNext();
    refreshRecent();
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible'){
    renderCourse();
    renderNext();
    renderFS();
    refreshRecent();
    loadSettings();
  }
});

renderCourse();
renderNext();
loadSettings();
</script>
</body>
</html>
