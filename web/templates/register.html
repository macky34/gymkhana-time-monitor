<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{{.EventName}} | 参加登録</title>
<link rel="stylesheet" href="/static/cropper.min.css">
<style>
  :root{
    --bg:#14171c; --panel:#1d232c; --panel2:#242b36; --line:#313a47;
    --tx:#e9edf3; --mut:#8b95a5; --dim:#5b6472;
    --go:#3ad07f; --amber:#ffb224; --red:#ff5d5d; --blue:#5aa2ff;
    --mono:"SFMono-Regular","Cascadia Mono","Consolas","Roboto Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#0b0d10;color:var(--tx);font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
       display:flex;justify-content:center;padding:0;min-height:100vh}
  .phone{width:392px;max-width:100%;background:var(--bg);border:1px solid #262d38;border-radius:22px;
         overflow:hidden;display:flex;flex-direction:column;height:100vh;height:100dvh;max-height:none;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative}
  header{padding:10px 14px 8px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:8px;flex:none}
  header .ev{font-size:13px;font-weight:700;letter-spacing:.02em}
  header .live{margin-left:auto;font-size:10px;color:var(--go);font-family:var(--mono);display:flex;align-items:center;gap:5px}
  header .live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--go);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  main{flex:1;overflow-y:auto;overscroll-behavior:contain}
  .screen{display:none;padding:12px 12px 20px}
  .screen.on{display:block}
  .sec{font-size:10.5px;color:var(--mut);letter-spacing:.14em;margin:16px 2px 7px;font-weight:600}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px}
  .t{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:8px;
       padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:inherit}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--go);border-color:var(--go);color:#08130c;font-weight:700}
  .btn.danger{color:var(--red);border-color:#5a3038}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;
          font-size:15px;font-weight:700;flex:none;border:1px solid var(--line);overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .toast{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);background:#2b3a2f;border:1px solid var(--go);
         color:var(--go);font-size:12px;padding:9px 18px;border-radius:99px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:40;white-space:nowrap}
  .toast.on{opacity:1}
  .note{font-size:10px;color:var(--dim);margin-top:8px;line-height:1.6}
  @media(min-width:900px){
    body{padding:20px;align-items:flex-start}
    .phone{width:min(1180px,97vw);height:94vh;max-height:none;border-radius:14px;display:flex}
    header .ev{font-size:15px}
    .screen{padding:20px 28px 32px}
    #sc-register{max-width:620px;margin:0 auto}
    .toast{bottom:auto;top:70px}
  }
  /* ---- register-specific ---- */
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:11px;color:var(--mut);margin-bottom:5px}
  .fld input,.fld select{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:9px;
        color:var(--tx);padding:10px 12px;font-size:14px;font-family:inherit}
  .fldrow{display:flex;gap:10px}
  .fldrow .fld{flex:1}
  .fldrow .fld.sm{flex:0 0 96px}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--mut);
              padding:9px 4px;font-size:12px;cursor:pointer;font-family:inherit;min-width:64px}
  .seg button.on{border-color:var(--go);color:var(--go);background:#22302a}
  .hint{font-size:10.5px;color:var(--dim);margin-top:4px;line-height:1.5}
  .welcome{text-align:center;padding:28px 8px 8px}
  .welcome h2{font-size:17px;margin-bottom:4px}
  .welcome p{font-size:11.5px;color:var(--mut)}
  .modal-bg{position:absolute;inset:0;background:rgba(5,7,10,.7);display:none;align-items:flex-end;z-index:30}
  .modal-bg.on{display:flex}
  .modal{background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;
         max-height:86%;overflow-y:auto;padding:16px 16px 24px;animation:up .22s ease-out}
  @keyframes up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  .modal h3{font-size:15px;margin-bottom:10px;text-align:center}
  .cropwrap{max-height:340px;min-height:200px;overflow:hidden;margin:0 0 14px;background:#000;border-radius:8px}
  .cropwrap img{max-width:100%;display:block}
  @media(min-width:900px){
    .modal-bg{align-items:center;justify-content:center}
    .modal{width:460px;border-radius:18px;border:1px solid var(--line)}
  }
</style>
</head>
<body>
<div class="phone">
  <header>
    <span class="ev">{{.EventName}}</span>
    <span class="live t">LIVE</span>
  </header>

  <main id="main">
  <section class="screen on" id="sc-register">

    <div id="reg-closed" style="display:none">
      <div class="welcome">
        <div style="font-size:32px">🚧</div>
        <h2>参加受付は終了しました</h2>
        <p id="reg-closed-msg">現在、新規の参加登録は受け付けていません。</p>
        <a class="btn" href="/archive" style="display:inline-block;margin-top:16px;text-decoration:none">アーカイブを見る →</a>
      </div>
    </div>

    <div id="reg-form-wrap" style="display:none">
      <div class="welcome">
        <div style="font-size:32px">🏁</div>
        <h2>参加登録</h2>
        <p>登録するとマイページ・ランキング・モニターが使えます</p>
      </div>
      <div class="sec">DRIVER — ドライバー情報</div>
      <div class="fld"><label>ドライバー名</label><input id="reg-name" placeholder="例: 山田 太郎"></div>
      <div class="fld"><label>区分</label>
        <div class="seg" id="reg-class-seg"></div>
      </div>
      <div class="sec">VEHICLE — 車両</div>
      <div class="fld">
        <select id="reg-vsel"><option value="">新規登録する</option></select>
      </div>
      <div id="reg-newv">
        <div class="fldrow">
          <div class="fld sm"><label>号車番号</label><input class="t" id="reg-number" style="text-align:center" inputmode="numeric"></div>
          <div class="fld"><label>車両名</label><input id="reg-vname" placeholder="例: スイフト"></div>
        </div>
        <div class="hint" id="reg-numwarn" style="display:none;color:var(--amber)">この番号は既に使用されています (登録は可能です)</div>
        <div class="fld"><label>エンジン方式</label>
          <div class="seg" id="reg-eng">
            <button type="button" class="on" data-e="gasoline">ガソリン</button>
            <button type="button" data-e="diesel">ディーゼル</button>
            <button type="button" data-e="rotary">ロータリー</button>
            <button type="button" data-e="ev">EV</button>
          </div>
        </div>
        <div id="reg-ice">
          <div class="fld"><label>排気量 (実cc)</label><input class="t" id="reg-cc" value="658" inputmode="numeric"></div>
          <div class="fld"><label>過給機</label>
            <div class="seg" id="reg-fi"><button type="button" class="on" data-fi="0">NA</button><button type="button" data-fi="1">ターボ / SC</button></div>
            <div class="hint" id="reg-conv"></div>
          </div>
        </div>
        <div class="fld"><label>駆動方式</label>
          <div class="seg" id="reg-dt"></div>
        </div>
      </div>
      <div class="fld"><label>アイコン (任意)</label>
        <div class="card" style="padding:14px;display:flex;align-items:center;gap:12px">
          <div class="avatar" style="width:52px;height:52px;font-size:20px" id="reg-avatar-preview">?</div>
          <button type="button" class="btn" id="reg-icon-btn">写真を選んで切り抜き</button>
          <input type="file" accept="image/*" id="reg-icon-file" style="display:none">
        </div>
      </div>
      <button type="button" class="btn primary" style="width:100%;padding:13px;font-size:15px" id="reg-submit">登録してはじめる</button>
      <p class="note">登録と同時にこの端末がログイン状態になり、マイページへ移動します。ログインURL/QRはマイページからいつでも表示・保存できます。</p>
    </div>

  </section>
  </main>

  <div class="modal-bg" id="cropmodal">
    <div class="modal">
      <h3>アイコンを切り抜き</h3>
      <div class="cropwrap"><img id="crop-img" alt=""></div>
      <button type="button" class="btn primary" style="width:100%" id="crop-apply">適用</button>
      <button type="button" class="btn" style="width:100%;margin-top:8px" id="crop-cancel">キャンセル</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>
<script src="/static/cropper.min.js"></script>
<script>
'use strict';

function h(tag, attrs, ...children){
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs){
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.setAttribute('style', attrs[k]);
    else if (k.indexOf('on') === 0 && typeof attrs[k] === 'function') e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of children.flat(Infinity)){
    if (c === null || c === undefined) continue;
    e.appendChild((typeof c === 'string' || typeof c === 'number') ? document.createTextNode(String(c)) : c);
  }
  return e;
}
function clear(el){ while (el.firstChild) el.removeChild(el.firstChild); }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toast._tm);
  toast._tm = setTimeout(() => t.classList.remove('on'), 1800);
}

async function apiGet(url){
  const res = await fetch(url, { credentials: 'same-origin' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}
async function apiPost(url, body){
  const res = await fetch(url, {
    method: 'POST', credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  let data = null;
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error((data && data.error) || ('HTTP ' + res.status));
  return data;
}

/* ---------- domain math mirror (display preview only; server is authoritative) ---------- */
function convertedCC(cc, engine, fi, coef){
  if (engine === 'ev') return { cc: 0, ok: false };
  let k = 1;
  if (engine === 'rotary') k *= coef.rotary;
  if (fi) k *= (engine === 'diesel' ? coef.turbo_diesel : coef.turbo_gasoline);
  return { cc: Math.floor(cc * k), ok: true };
}
function dispClassOf(cc, ok, classes){
  if (!ok) return 'EV';
  for (const c of classes){
    if (c.max_cc === null || c.max_cc === undefined || cc <= c.max_cc) return c.label;
  }
  return classes.length ? classes[classes.length - 1].label : '';
}

/* ---------- state ---------- */
let settings = null;
let vehiclesList = [];
let currentEngine = 'gasoline';
let currentFI = false;
let currentDtClassId = null;
let iconB64 = null;
let cropper = null;

function segBind(containerId, dataAttr, onSelect){
  const box = document.getElementById(containerId);
  box.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      box.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      onSelect(btn.dataset[dataAttr], btn);
    });
  });
}

function updateConvPreview(){
  const hint = document.getElementById('reg-conv');
  if (currentEngine === 'ev'){
    hint.textContent = 'EVクラス (換算なし)';
    return;
  }
  if (!settings || !settings.coefficients || !settings.displacement_classes){
    hint.textContent = '';
    return;
  }
  const cc = parseInt(document.getElementById('reg-cc').value, 10) || 0;
  const { cc: cv, ok } = convertedCC(cc, currentEngine, currentFI, settings.coefficients);
  const cls = dispClassOf(cv, ok, settings.displacement_classes);
  hint.textContent = `換算排気量 ${cv}cc → クラス自動判定: ${cls}`;
}

function checkNumberDup(){
  const warn = document.getElementById('reg-numwarn');
  const num = parseInt(document.getElementById('reg-number').value, 10);
  const dup = !!num && vehiclesList.some(v => v.number === num);
  warn.style.display = dup ? 'block' : 'none';
}

async function loadStaticData(){
  try {
    settings = await apiGet('/api/settings');
  } catch (e) {
    toast('設定の取得に失敗しました');
    settings = { driver_classes: [], dt_classes: [], registration_open: true, registration_mode: 'public' };
  }
  const noActiveEvent = settings.event === null || settings.event_status === 'closed';
  if (noActiveEvent || settings.registration_open === false || settings.registration_mode === 'staff'){
    document.getElementById('reg-closed').style.display = 'block';
    if (noActiveEvent){
      document.getElementById('reg-closed-msg').textContent = '現在開催中のイベントはありません。過去の記録はアーカイブからご覧いただけます。';
    } else if (settings.registration_mode === 'staff' && settings.registration_open !== false){
      document.getElementById('reg-closed-msg').textContent = '現在、参加登録は運営による代理登録のみ受け付けています。受付窓口までお越しください。';
    }
    return;
  }
  document.getElementById('reg-form-wrap').style.display = 'block';

  try {
    const v = await apiGet('/api/vehicles');
    vehiclesList = v.vehicles || [];
  } catch (e) { vehiclesList = []; }

  const vsel = document.getElementById('reg-vsel');
  vehiclesList.forEach(v => vsel.appendChild(h('option', { value: String(v.id) }, `#${v.number} ${v.name}`)));
  vsel.addEventListener('change', () => {
    document.getElementById('reg-newv').style.display = vsel.value === '' ? 'block' : 'none';
  });

  const classSeg = document.getElementById('reg-class-seg');
  clear(classSeg);
  let selectedDriverClassId = null;
  (settings.driver_classes || []).forEach((c, i) => {
    const btn = h('button', { type: 'button', class: i === 0 ? 'on' : '' }, c.label);
    btn.addEventListener('click', () => {
      classSeg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      selectedDriverClassId = c.id;
    });
    classSeg.appendChild(btn);
    if (i === 0) selectedDriverClassId = c.id;
  });

  const dtSeg = document.getElementById('reg-dt');
  clear(dtSeg);
  (settings.dt_classes || []).forEach((c, i) => {
    const btn = h('button', { type: 'button', class: i === 0 ? 'on' : '' }, c.label);
    btn.addEventListener('click', () => {
      dtSeg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      currentDtClassId = c.id;
    });
    dtSeg.appendChild(btn);
    if (i === 0) currentDtClassId = c.id;
  });

  segBind('reg-eng', 'e', (val) => {
    currentEngine = val;
    document.getElementById('reg-ice').style.display = (val === 'ev') ? 'none' : 'block';
    updateConvPreview();
  });
  segBind('reg-fi', 'fi', (val) => {
    currentFI = val === '1';
    updateConvPreview();
  });
  document.getElementById('reg-cc').addEventListener('input', updateConvPreview);
  document.getElementById('reg-number').addEventListener('input', checkNumberDup);
  updateConvPreview();

  document.getElementById('reg-name').addEventListener('input', e => {
    if (!iconB64){
      document.getElementById('reg-avatar-preview').textContent = (e.target.value || '?').slice(0, 1);
    }
  });

  document.getElementById('reg-submit').addEventListener('click', () => {
    submitRegister(selectedDriverClassIdGetter);
  });
  function selectedDriverClassIdGetter(){ return selectedDriverClassId; }
}

async function submitRegister(getDriverClassId){
  const name = document.getElementById('reg-name').value.trim();
  if (!name){ toast('ドライバー名を入力してください'); return; }
  const driverClassId = getDriverClassId();
  const vsel = document.getElementById('reg-vsel');
  let vehicle;
  if (vsel.value !== ''){
    vehicle = { vehicle_id: Number(vsel.value) };
  } else {
    const num = parseInt(document.getElementById('reg-number').value, 10);
    const vname = document.getElementById('reg-vname').value.trim();
    if (!num){ toast('号車番号を入力してください'); return; }
    if (!vname){ toast('車両名を入力してください'); return; }
    vehicle = {
      number: num,
      name: vname,
      engine_type: currentEngine,
      displacement_cc: currentEngine === 'ev' ? null : (parseInt(document.getElementById('reg-cc').value, 10) || 0),
      forced_induction: currentEngine === 'ev' ? false : currentFI,
      drivetrain_class_id: currentDtClassId
    };
  }
  const body = { name, driver_class_id: driverClassId, icon_b64: iconB64 || null, vehicle };
  const btn = document.getElementById('reg-submit');
  btn.disabled = true;
  try {
    await apiPost('/api/register', body);
    location.href = '/mypage';
  } catch (e) {
    toast(e.message || '登録に失敗しました');
    btn.disabled = false;
  }
}

/* ---------- icon crop flow (Cropper.js, self-hosted) ---------- */
document.getElementById('reg-icon-btn').addEventListener('click', () => {
  document.getElementById('reg-icon-file').click();
});
document.getElementById('reg-icon-file').addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = document.getElementById('crop-img');
    img.src = reader.result;
    document.getElementById('cropmodal').classList.add('on');
    img.onload = () => {
      if (cropper) { cropper.destroy(); cropper = null; }
      cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1, autoCropArea: 1, background: false });
    };
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});
document.getElementById('crop-cancel').addEventListener('click', () => {
  if (cropper) { cropper.destroy(); cropper = null; }
  document.getElementById('cropmodal').classList.remove('on');
});
document.getElementById('crop-apply').addEventListener('click', () => {
  if (!cropper) return;
  const canvas = cropper.getCroppedCanvas({ width: 128, height: 128 });
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  iconB64 = dataUrl.split(',')[1];
  const preview = document.getElementById('reg-avatar-preview');
  clear(preview);
  preview.appendChild(h('img', { src: dataUrl, alt: '' }));
  cropper.destroy(); cropper = null;
  document.getElementById('cropmodal').classList.remove('on');
});

loadStaticData();
</script>
</body>
</html>
