; timemon sensor firmware (ESP32 DevKit / Seeed XIAO ESP32C6).
; start/goal share one firmware; config.h selects SENSOR_ID / SSID / RPi IP.
; ESP32C6 support added via the seeed_xiao_esp32c6 env below (see that env's
; comment for why it needs the pioarduino platform fork).
[env]
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=2

[env:esp32dev]
platform = espressif32
board = esp32dev

; Seeed Studio XIAO ESP32C6. The ESP32-C6 needs Arduino core 3.x (IDF 5.x),
; which the official platformio/platform-espressif32 release train does not
; yet ship. pioarduino (https://github.com/pioarduino/platform-espressif32)
; is the community fork that packages current Espressif Arduino releases as
; PlatformIO platform zips; pinned here to its 55.03.39 tag (Arduino core
; 3.3.9 / ESP-IDF 5.5.4), per that repo's Releases page.
[env:seeed_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = seeed_xiao_esp32c6
